<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOLA — Chat</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="chat-page-body" data-page="chat">

<!-- NAVBAR -->
<nav class="navbar" style="flex-shrink:0;">
    <div class="nav-container">
        <a href="dashboard.html" class="logo" style="text-decoration:none;color:inherit;">🔍 THOLA</a>
        <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-actions">
            <a href="profile.html" class="login-link" id="profileNavLink">&#128100; My Profile</a>
            <button id="theme-toggle" class="btn-toggle" aria-label="Toggle dark mode" data-tooltip="Dark Mode">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
        </div>
    </div>
</nav>

<!-- Main content fills remaining height -->
<div class="chat-main">

    <!-- Back button strip -->
    <div class="chat-back-strip">
        <a href="dashboard.html" class="back-link">← Back</a>
    </div>

    <!-- The actual chat box -->
    <div class="chat-box">

        <!-- Sidebar: conversations list -->
        <aside class="chat-box-sidebar">
            <div class="chat-box-sidebar-header">Messages</div>
            <div class="chat-box-list" id="chatList">
                <div class="chat-item active" onclick="switchChat(0)">
                    <div class="seller-avatar avatar-sm">TM</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">Thabo M.</div>
                        <div class="chat-item-preview">Deal at R320 ✅</div>
                    </div>
                    <div class="chat-item-time">2m</div>
                </div>
                <div class="chat-item" onclick="switchChat(1)">
                    <div class="seller-avatar avatar-sm">NS</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">Naledi S.</div>
                        <div class="chat-item-preview">Is it still available?</div>
                    </div>
                    <div class="chat-item-time">1h</div>
                </div>
            </div>
        </aside>

        <!-- Right: message window -->
        <section class="chat-box-window">

            <!-- Header -->
            <div class="chat-box-header">
                <div class="chat-header-info">
                    <div class="seller-avatar avatar-md">TM</div>
                    <div>
                        <div class="chat-header-name">Thabo M. <span class="verified-badge">✓ Verified</span></div>
                        <div class="chat-header-sub">Professional House Cleaning • R350/session</div>
                    </div>
                </div>
                <div class="chat-header-status">
                    <div class="online-dot"></div>
                    <span class="online-label">Online</span>
                </div>
            </div>

            <!-- Messages area -->
            <div class="chat-box-messages" id="chatMessages"></div>

            <!-- Offer bar -->
            <div class="chat-box-offer">
                <span class="offer-label">💰 Offer:</span>
                <input type="number" id="offerInput" class="offer-input" placeholder="Amount in R" style="flex:1;min-width:0;">
                <button class="btn-accept" onclick="sendOffer()">Send Offer</button>
            </div>

            <!-- Input row -->
            <div class="chat-box-input-row">
                <textarea id="chatInput" class="chat-box-textarea" rows="2" placeholder="Type a message... (Enter to send)"></textarea>
                <button class="chat-box-send" onclick="sendMessage()">➤</button>
            </div>

        </section>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>THOLA &copy; 2026 — Find What You Need. Offer What You Have. Trust Who You Deal With.</p>
</footer>

<script src="../js/main.js"></script>
<script src="../js/chat.js"></script>
</body>
</html>
