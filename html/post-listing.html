<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Listing</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .post-section {
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0,0.2);
        }

        .post-section h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input:focus, textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52,152,219,0.5);
        }

        textarea {
            resize: none ;
            height: 80px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
            transition: scale(1.03);
        }
    </style>
</head>
<body>
    <section class="posting-section">

    <h1>Post The Service</h1>

    <form>

        <label>Service Title</label>
        <input type="text" placeholder="Enter Service title">
        
        <label>Description</label>
        <textarea placeholder="Describe your Service"></textarea>
        
        <label>Price</label>
        <input type="text" placeholder="Enter price">

        <label>Location</label>
        <input type="text" placeholder="Enter your location">

        <label>Upload Image</label>
        <input type="file">

        <button type="submit">Post</button>


    </form>
    </section>
    
</body>
</html>
