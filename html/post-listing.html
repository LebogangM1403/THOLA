<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Listing</title>
    
    <link rel="stylesheet" href="../css/post-listing.css">
</head>
<body>
    <section class="posting-section">

    <h1>Post The Service</h1>

    <form>

        <label>Service Title</label>
        <input type="text" placeholder="Enter Service title">
        
        <label>Description</label>
        <textarea placeholder="Describe your Service"></textarea>
        
        <label>Price</label>
        <input type="text" placeholder="Enter price">

        <label>Location</label>
        <input type="text" placeholder="Enter your location">

        <label>Upload Image</label>
        <input type="file">

        <button type="submit">Posting</button>


    </form>
    </section>
    
</body>
</html>
