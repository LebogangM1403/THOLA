<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOLA — Post a Listing</title>
<link rel="stylesheet" href="../css/style.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="dashboard.html" class="logo" style="text-decoration: none; color: inherit;">🔍 THOLA</a>
        
        <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-actions">
            <a href="profile.html" class="login-link" id="profileNavLink">&#128100; My Profile</a>
                <button id="theme-toggle" class="btn-toggle" aria-label="Toggle dark mode" data-tooltip="Dark Mode">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
        </div>
    </div>
</nav>

<!-- Back Button -->
<div class="back-bar">
    <a href="dashboard.html" class="back-link">← Back</a>
</div>

<div class="post-container">
    <div class="post-card">
        <div class="post-header">
            <h1>Post a New Listing</h1>
            <p style="color:#64748b; margin-top:8px;">Reach more customers in your area</p>
        </div>

        <form id="postForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Listing Type</label>
                    <select id="listingType" required>
                        <option value="skill">Skill / Service</option>
                        <option value="goods">Goods / Product</option>
                        <option value="job">Job / Opportunity</option>
                        <option value="request">Request / Need</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="e.g. House Cleaning, Tutoring" required>
                </div>
            </div>

            <div class="form-group">
                <label>Listing Title</label>
                <input type="text" id="title" placeholder="e.g. Professional House Cleaning Service" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Describe what you offer, your experience, and what makes you different..." required></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Price (R)</label>
                    <input type="number" id="price" placeholder="350" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" value="Gauteng, South Africa" required>
                </div>
            </div>

            <div class="form-group">
                <label>Upload Image (Optional)</label>
                <div class="image-upload-area" id="uploadArea">
                    <p>📸 Click or drag image here</p>
                    <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                </div>
                <img id="imagePreview" alt="Preview">
            </div>

            <button type="submit" class="btn-post">🚀 Post Listing Now</button>
        </form>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none;">Listing posted successfully!</div>

<script src="../js/main.js"></script>
<script>
// Image Preview
const uploadArea = document.getElementById('uploadArea');
const imageUpload = document.getElementById('imageUpload');
const imagePreview = document.getElementById('imagePreview');

uploadArea.addEventListener('click', () => imageUpload.click());

imageUpload.addEventListener('change', function(e) {
    if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            imagePreview.src = ev.target.result;
            imagePreview.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }
});

// Form Submit - Save to localStorage
document.getElementById('postForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const listing = {
        id: Date.now(),
        type: document.getElementById('listingType').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        price: document.getElementById('price').value,
        location: document.getElementById('location').value,
        category: document.getElementById('category').value,
        image: imagePreview.src || null,
        date: new Date().toISOString(),
        views: 0,
        deals: 0
    };

    // Save to localStorage
    let listings = JSON.parse(localStorage.getItem('thola_listings') || '[]');
    listings.unshift(listing); // Add to beginning
    localStorage.setItem('thola_listings', JSON.stringify(listings));

    // Show success message
    const toast = document.getElementById('toast');
    toast.textContent = "✅ Listing posted successfully!";
    toast.style.display = 'block';
    toast.style.background = '#22c55e';

    // Reset form
    this.reset();
    imagePreview.style.display = 'none';

    // Redirect to dashboard after 1.5 seconds
    setTimeout(() => {
        window.location.href = 'dashboard.html';
    }, 1500);
});
</script>


<footer>
    <p>THOLA &copy; 2026 &mdash; Find What You Need. Offer What You Have. Trust Who You Deal With.</p>
</footer>
</body>
</html>
