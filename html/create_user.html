<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOLA — Create Account</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="nav-container">
    <a href="index.html" class="logo"><span class="logo-dot"></span> THOLA</a>
    
        <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-actions">
        <a href="login.html" class="nav-link">Log In</a>
        <button id="theme-toggle" class="btn-toggle" aria-label="Toggle dark mode" data-tooltip="Dark Mode">
            <span class="icon-sun">☀️</span>
            <span class="icon-moon">🌙</span>
        </button>
    </div>
</div>
</nav>

<main class="auth-page">
    <!-- Register Card -->
    <section class="auth-card" id="register-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join South Africa’s trusted local marketplace</p>
        
        <form id="register-form" class="auth-form">
            <input type="text" id="name" placeholder="Full Name" required autocomplete="name" class="auth-input" />
            <input type="email" id="email" placeholder="Email address" required autocomplete="email" class="auth-input" />
            <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password" class="auth-input" />
            
            <div id="register-error" class="error-msg"></div>
            
            <button type="submit" class="auth-button" id="register-submit">Get Verification Code</button>
        </form>

        <p class="auth-switch">
            Already have an account? 
            <a href="login.html" class="auth-link">Log in</a>
        </p>
    </section>

    <!-- OTP Card -->
    <section class="auth-card" id="otp-card" style="display: none;">
        <h1 class="auth-title">Verify Your Email</h1>
        <p class="auth-subtitle" id="otp-subtitle">We sent a 6-digit code to your email</p>
        
        <form id="otp-form" class="auth-form">
            <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6" required class="auth-input" style="text-align:center; font-size:28px; letter-spacing:8px; font-weight:700;" />
            
            <div id="otp-error" class="error-msg"></div>
            
            <button type="submit" class="auth-button" id="otp-submit">Verify & Create Account</button>
        </form>

        <p class="auth-switch">
            Didn't receive the code? 
            <a href="#" id="resend-otp-link" class="auth-link">Resend Code</a>
        </p>
    </section>
</main>

<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="../js/create_user.js"></script>
</body>
</html>
