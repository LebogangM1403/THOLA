<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOLA — Chat</title>
<link rel="stylesheet" href="../css/style.css">
<style>
/* ── Scoped chat-page overrides ── */
html, body { height: 100%; margin: 0; }

.chat-page-body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
    box-sizing: border-box;
}

.chat-back-strip {
    padding: 14px 0 10px;
    flex-shrink: 0;
}

.chat-box {
    flex: 1;
    display: flex;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    min-height: 0;
    margin-bottom: 16px;
}
[data-theme="dark"] .chat-box {
    border-color: rgba(255,255,255,0.08);
}

/* Sidebar */
.chat-box-sidebar {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #e2e8f0;
    background: #ffffff;
    overflow: hidden;
}
[data-theme="dark"] .chat-box-sidebar {
    background: #1a2d50;
    border-color: rgba(255,255,255,0.08);
}

.chat-box-sidebar-header {
    padding: 18px 20px;
    font-weight: 700;
    font-size: 16px;
    color: #0d1e3d;
    border-bottom: 1px solid #e2e8f0;
    flex-shrink: 0;
}
[data-theme="dark"] .chat-box-sidebar-header {
    color: #e8edf5;
    border-color: rgba(255,255,255,0.08);
}

.chat-box-list {
    flex: 1;
    overflow-y: auto;
}

/* Chat window */
.chat-box-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #ffffff;
}
[data-theme="dark"] .chat-box-window {
    background: #1a2d50;
}

.chat-box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #e2e8f0;
    flex-shrink: 0;
    background: #ffffff;
}
[data-theme="dark"] .chat-box-header {
    background: #1a2d50;
    border-color: rgba(255,255,255,0.08);
}

.chat-box-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-box-offer {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
}
[data-theme="dark"] .chat-box-offer {
    background: #1e3460;
    border-color: rgba(255,255,255,0.08);
}

.chat-box-input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 20px 16px;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
    background: #ffffff;
}
[data-theme="dark"] .chat-box-input-row {
    background: #1a2d50;
    border-color: rgba(255,255,255,0.08);
}

.chat-box-textarea {
    flex: 1;
    resize: none;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    max-height: 100px;
    outline: none;
    color: #1e293b;
    background: #f8fafc;
    transition: border-color 0.2s;
}
.chat-box-textarea:focus { border-color: #0d1e3d; background: white; }
[data-theme="dark"] .chat-box-textarea {
    background: #1e3460;
    border-color: rgba(255,255,255,0.1);
    color: #e8edf5;
}

.chat-box-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #ff6600;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
}
.chat-box-send:hover { background: #e65c00; }

/* Date divider */
.chat-date-divider {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    padding: 0 0 8px;
}

@media (max-width: 768px) {
    .chat-box { flex-direction: column; }
    .chat-box-sidebar { width: 100%; max-height: 160px; border-right: none; border-bottom: 1px solid #e2e8f0; }
    [data-theme="dark"] .chat-box-sidebar { border-bottom-color: rgba(255,255,255,0.08); }
}
</style>
</head>

<body class="chat-page-body" data-page="chat">

<!-- NAVBAR -->
<nav class="navbar" style="flex-shrink:0;">
    <div class="nav-container">
        <a href="dashboard.html" class="logo" style="text-decoration:none;color:inherit;">🔍 THOLA</a>
        <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-actions">
            <a href="profile.html" class="login-link" id="profileNavLink">&#128100; My Profile</a>
            <button id="theme-toggle" class="btn-toggle" aria-label="Toggle dark mode" data-tooltip="Dark Mode">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
        </div>
    </div>
</nav>

<!-- Main content fills remaining height -->
<div class="chat-main">

    <!-- Back button strip -->
    <div class="chat-back-strip">
        <a href="dashboard.html" class="back-link">← Back</a>
    </div>

    <!-- The actual chat box -->
    <div class="chat-box">

        <!-- Sidebar: conversations list -->
        <aside class="chat-box-sidebar">
            <div class="chat-box-sidebar-header">Messages</div>
            <div class="chat-box-list" id="chatList">
                <div class="chat-item active" onclick="switchChat(0)">
                    <div class="seller-avatar avatar-sm">TM</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">Thabo M.</div>
                        <div class="chat-item-preview">Deal at R320 ✅</div>
                    </div>
                    <div class="chat-item-time">2m</div>
                </div>
                <div class="chat-item" onclick="switchChat(1)">
                    <div class="seller-avatar avatar-sm">NS</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">Naledi S.</div>
                        <div class="chat-item-preview">Is it still available?</div>
                    </div>
                    <div class="chat-item-time">1h</div>
                </div>
            </div>
        </aside>

        <!-- Right: message window -->
        <section class="chat-box-window">

            <!-- Header -->
            <div class="chat-box-header">
                <div class="chat-header-info">
                    <div class="seller-avatar avatar-md">TM</div>
                    <div>
                        <div class="chat-header-name">Thabo M. <span class="verified-badge">✓ Verified</span></div>
                        <div class="chat-header-sub">Professional House Cleaning • R350/session</div>
                    </div>
                </div>
                <div class="chat-header-status">
                    <div class="online-dot"></div>
                    <span class="online-label">Online</span>
                </div>
            </div>

            <!-- Messages area -->
            <div class="chat-box-messages" id="chatMessages"></div>

            <!-- Offer bar -->
            <div class="chat-box-offer">
                <span class="offer-label">💰 Offer:</span>
                <input type="number" id="offerInput" class="offer-input" placeholder="Amount in R" style="flex:1;min-width:0;">
                <button class="btn-accept" onclick="sendOffer()">Send Offer</button>
            </div>

            <!-- Input row -->
            <div class="chat-box-input-row">
                <textarea id="chatInput" class="chat-box-textarea" rows="2" placeholder="Type a message... (Enter to send)"></textarea>
                <button class="chat-box-send" onclick="sendMessage()">➤</button>
            </div>

        </section>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>THOLA &copy; 2026 — Find What You Need. Offer What You Have. Trust Who You Deal With.</p>
</footer>

<script src="../js/main.js"></script>
<script>
let messages = [
    { type: "received", text: "Hi! Is the cleaning service still available this weekend?", time: "10:02" },
    { type: "sent",     text: "Yes, available! Saturday or Sunday morning.", time: "10:04" },
    { type: "received", text: "Saturday works. Would you do R300?", time: "10:06" },
    { type: "sent",     text: "💰 Best offer: R320", time: "10:07" }
];

function renderMessages() {
    const c = document.getElementById('chatMessages');
    c.innerHTML = '<div class="chat-date-divider">Today • Connected with Thabo M.</div>';
    messages.forEach(msg => {
        const d = document.createElement('div');
        d.className = `message-wrap ${msg.type}`;
        d.innerHTML = `<div class="message-bubble ${msg.type}">${msg.text}</div>
                       <div class="message-meta">${msg.type==='sent'?'You':'Thabo M.'} · ${msg.time}</div>`;
        c.appendChild(d);
    });
    c.scrollTop = c.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    messages.push({ type:"sent", text, time:now });
    renderMessages();
    input.value = '';
}

function sendOffer() {
    const amount = document.getElementById('offerInput').value;
    if (!amount) return;
    const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    messages.push({ type:"sent", text:`💰 Offer: R${amount}`, time:now });
    renderMessages();
    document.getElementById('offerInput').value = '';
}

document.getElementById('chatInput').addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

renderMessages();
</script>
</body>
</html>
