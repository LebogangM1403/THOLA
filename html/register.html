<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account – Thola Platform</title>
    <meta name="description" content="Create a new account on the Thola platform. Join the community and start discovering local services.">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

     <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">&#128270;</span> THOLA
            </div>
            <div class="nav-actions">
               
                <button id="theme-toggle" class="btn-toggle" aria-label="Toggle dark mode" data-tooltip="Dark Mode">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </div>
        </div>
    </nav>
    <main class="auth-page">
        <!-- Step 1: Register Form -->
        <section class="auth-card" id="register-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join us and start exploring</p>
            
            <form id="register-form" class="auth-form">
                <label for="name" class="sr-only">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" required autocomplete="name" class="auth-input" />

                <label for="email" class="sr-only">Email address</label>
                <input type="email" id="email" name="email" placeholder="Email address" required autocomplete="email" class="auth-input" />

                <label for="password" class="sr-only">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required autocomplete="new-password" class="auth-input" />

                <div id="register-error" class="error-msg" style="display: none; color: #ff3333; font-size: 14px; font-weight: 600; text-align: left; margin: -8px 0 8px 0;"></div>

                <button type="submit" class="auth-button" id="register-submit">Get Verification Code</button>
            </form>
            <p class="auth-switch">
                Already have an account?
                <a href="login.html" class="auth-link">Log in</a>
            </p>
        </section>

        <!-- Step 2: OTP Verification Card (Hidden by default) -->
        <section class="auth-card" id="otp-card" style="display: none;">
            <h1 class="auth-title">Verify Email</h1>
            <p class="auth-subtitle" id="otp-subtitle">We sent a 6-digit code to your email</p>
            
            <form id="otp-form" class="auth-form">
                <label for="otp" class="sr-only">Verification Code</label>
                <input type="text" id="otp" name="otp" placeholder="6-Digit Code" required maxlength="6" pattern="\d{6}" class="auth-input" style="letter-spacing: 8px; text-align: center; font-size: 24px; font-weight: 700;" />

                <div id="otp-error" class="error-msg" style="display: none; color: #ff3333; font-size: 14px; font-weight: 600; text-align: left; margin: -8px 0 8px 0;"></div>

                <button type="submit" class="auth-button" id="otp-submit">Verify & Register</button>
            </form>
            
            <p class="auth-switch">
                Didn't receive a code?
                <a href="#" id="resend-otp-link" class="auth-link">Resend Code</a>
            </p>
        </section>
    </main>

    <!-- Include the local ignored credentials file and EmailJS SDK client library -->
    <script src="../js/credentials.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('register-form');
            const otpForm = document.getElementById('otp-form');
            const registerCard = document.getElementById('register-card');
            const otpCard = document.getElementById('otp-card');
            const registerError = document.getElementById('register-error');
            const otpError = document.getElementById('otp-error');
            const otpSubtitle = document.getElementById('otp-subtitle');
            const resendOtpLink = document.getElementById('resend-otp-link');
            const registerSubmit = document.getElementById('register-submit');
            const otpSubmit = document.getElementById('otp-submit');

            let userEmail = '';
            let userName = '';
            let userPassword = '';
            let generatedOtp = '';

            // Initialize EmailJS with your public API key
            if (typeof EMAILJS_PUBLIC_KEY !== 'undefined' && EMAILJS_PUBLIC_KEY) {
                emailjs.init({
                    publicKey: EMAILJS_PUBLIC_KEY,
                });
            }

            // Simple SHA-256 password hashing helper function
            async function hashPassword(password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            // Get local database from localStorage
            function getDatabase() {
                const localData = localStorage.getItem('thola_database');
                if (localData) {
                    return JSON.parse(localData);
                }
                return [];
            }

            // Save database to localStorage
            function saveDatabase(users) {
                localStorage.setItem('thola_database', JSON.stringify(users));
            }

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                registerError.style.display = 'none';
                
                userName = document.getElementById('name').value.trim();
                userEmail = document.getElementById('email').value.trim().toLowerCase();
                userPassword = document.getElementById('password').value;

                // Validate if user exists
                const users = getDatabase();
                const userExists = users.some(u => u.email.toLowerCase() === userEmail);
                if (userExists) {
                    registerError.innerText = 'Email address already registered';
                    registerError.style.display = 'block';
                    return;
                }

                // Verify keys are configured
                if (typeof EMAILJS_PUBLIC_KEY === 'undefined' || EMAILJS_PUBLIC_KEY.includes('your_public_key')) {
                    registerError.innerText = 'Please configure your EmailJS API keys in js/credentials.js';
                    registerError.style.display = 'block';
                    return;
                }

                registerSubmit.disabled = true;
                registerSubmit.innerText = 'Sending OTP...';

                // Generate random 6-digit OTP
                generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();

                try {
                    // Send Email using EmailJS service
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        to_name: userName,
                        to_email: userEmail,
                        email: userEmail,
                        user_email: userEmail,
                        otp_code: generatedOtp,
                        otp: generatedOtp,
                        code: generatedOtp,
                        message: generatedOtp
                    }).then(() => {
                        otpSubtitle.innerHTML = `We sent a 6-digit code to <strong style="color: #ff6600;">${userEmail}</strong>`;
                        registerCard.style.display = 'none';
                        otpCard.style.display = 'block';
                        registerSubmit.disabled = false;
                        registerSubmit.innerText = 'Get Verification Code';
                    }).catch(err => {
                        registerError.innerText = 'Failed to send OTP: ' + (err.text || JSON.stringify(err));
                        registerError.style.display = 'block';
                        registerSubmit.disabled = false;
                        registerSubmit.innerText = 'Get Verification Code';
                    });
                } catch (err) {
                    registerError.innerText = 'EmailJS connection error. Please try again.';
                    registerError.style.display = 'block';
                    console.error(err);
                    registerSubmit.disabled = false;
                    registerSubmit.innerText = 'Get Verification Code';
                }
            });

            otpForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                otpError.style.display = 'none';
                const otpVal = document.getElementById('otp').value.trim();

                otpSubmit.disabled = true;
                otpSubmit.innerText = 'Verifying...';

                if (otpVal !== generatedOtp) {
                    otpError.innerText = 'Invalid verification code.';
                    otpError.style.display = 'block';
                    otpSubmit.disabled = false;
                    otpSubmit.innerText = 'Verify & Register';
                    return;
                }

                try {
                    // Hash Password & Persist
                    const hashedPassword = await hashPassword(userPassword);
                    const users = getDatabase();
                    
                    users.push({
                        name: userName,
                        email: userEmail,
                        password: hashedPassword,
                        registeredAt: new Date().toISOString()
                    });

                    saveDatabase(users);
                    alert('Verification successful! You will be redirected to the Login page.');
                    window.location.href = 'login.html';
                } catch (err) {
                    otpError.innerText = 'Error saving account info. Please try again.';
                    otpError.style.display = 'block';
                    console.error(err);
                } finally {
                    otpSubmit.disabled = false;
                    otpSubmit.innerText = 'Verify & Register';
                }
            });

            resendOtpLink.addEventListener('click', (e) => {
                e.preventDefault();
                registerForm.dispatchEvent(new Event('submit'));
            });
        });
    </script>
    <script src="..//js/script.js"></script>
</body>
</html>
