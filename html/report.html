<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THOLA — Report</title>
<link rel="stylesheet" href="../css/style.css">
<style>
/* Enhanced Report Page Styles */
.report-container {
    max-width: 620px;
    margin: 40px auto;
    padding: 0 20px;
}

.report-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 40px;
    border: 1px solid #e2e8f0;
}
[data-theme="dark"] .report-card {
    background: #141210;
    border-color: rgba(255,255,255,0.08);
}

.report-header {
    text-align: center;
    margin-bottom: 32px;
}
.report-header h2 {
    font-size: 28px;
    font-weight: 800;
    color: #0d1e3d;
    margin-bottom: 8px;
}
[data-theme="dark"] .report-header h2 { color: #F0EBE2; }

.report-subtitle {
    color: #64748b;
    font-size: 15px;
}
[data-theme="dark"] .report-subtitle { color: #A09880; }

.form-group {
    margin-bottom: 24px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #334155;
    font-size: 14px;
}
[data-theme="dark"] .form-group label { color: #A09880; }

.report-input, .report-select, .report-textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
}
[data-theme="dark"] .report-input,
[data-theme="dark"] .report-select,
[data-theme="dark"] .report-textarea {
    background: #1C1915;
    border-color: rgba(255,255,255,0.1);
    color: #F0EBE2;
}

.report-input:focus,
.report-select:focus,
.report-textarea:focus {
    border-color: #ff6600;
    box-shadow: 0 0 0 3px rgba(255,102,0,0.1);
    outline: none;
}

.report-textarea {
    resize: vertical;
    min-height: 140px;
}

.report-btn {
    width: 100%;
    background: #ff6600;
    color: white;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
}
.report-btn:hover {
    background: #e65c00;
    transform: translateY(-2px);
}
</style>
</head>
<body class="dashboard-page">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="dashboard.html" class="logo" style="text-decoration: none; color: inherit;">🔍 THOLA</a>
        <div class="nav-actions">
            <a href="profile.html" class="login-link" id="profileNavLink">&#128100; My Profile</a>
            <a href="search.html" class="login-link">🔍 Search</a>
            <a href="chat.html" class="login-link">💬 Chat</a>
            <a href="report.html" class="login-link">🚩 Report</a>
            <button class="btn-nav" onclick="window.location.href='post-listing.html'">+ Post a Listing</button>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <div class="toggle-knob" id="themeKnob">🌙</div>
            </button>
        </div>
    </div>
</nav>

<div class="report-container">
    <div class="report-card">
        <div class="report-header">
            <h2>Report a Listing or User</h2>
            <p class="report-subtitle">Help us keep THOLA safe and trustworthy for everyone</p>
        </div>

        <form id="reportForm">
            <div class="form-group">
                <label>What are you reporting?</label>
                <select class="report-select" id="reportType" required>
                    <option value="">Select Type</option>
                    <option value="listing">Listing / Post</option>
                    <option value="user">User / Seller</option>
                    <option value="scam">Scam or Fraud Attempt</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Listing ID or Username (if known)</label>
                <input type="text" class="report-input" id="itemId" placeholder="e.g. Listing #48392 or @thabo_m" />
            </div>

            <div class="form-group">
                <label>Reason for Report</label>
                <select class="report-select" id="reason" required>
                    <option value="">Choose Reason</option>
                    <option value="spam">Spam or Fake Listing</option>
                    <option value="fraud">Suspicious / Possible Scam</option>
                    <option value="inappropriate">Inappropriate Content</option>
                    <option value="harassment">Harassment or Bullying</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Detailed Description</label>
                <textarea class="report-textarea" id="description" placeholder="Please provide as much detail as possible..." required></textarea>
            </div>

            <button type="submit" class="report-btn">🚩 Submit Report</button>
        </form>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#22c55e; color:white; padding:14px 28px; border-radius:9999px; font-weight:600; display:none; z-index:1000; box-shadow:0 10px 15px rgba(0,0,0,0.1);">
    Report submitted successfully
</div>

<footer>
    <p>THOLA &copy; 2026 — Find What You Need. Offer What You Have. Trust Who You Deal With.</p>
</footer>

<script src="../js/main.js"></script>
<script>
document.getElementById('reportForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Simple validation
    const description = document.getElementById('description').value.trim();
    if (description.length < 10) {
        alert("Please provide more details in the description.");
        return;
    }

    // Show success toast
    const toast = document.getElementById('toast');
    toast.style.display = 'block';

    // Reset form
    this.reset();

    // Auto hide toast and redirect after 2 seconds
    setTimeout(() => {
        toast.style.display = 'none';
        window.location.href = 'dashboard.html';
    }, 2200);
});
</script>
</body>
</html>
