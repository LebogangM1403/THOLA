<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Thola Platform</title>
    <meta name="description" content="Secure login page for the Thola platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">

            <!-- Logo -->
            <span class="auth-logo">THOLA<span>.</span></span>
            <span class="auth-tagline">Find What You Need. Offer What You Have.</span>

            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue</p>



            <form action="#" method="POST" class="auth-form" id="login-form">
                <label for="email" class="sr-only">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" name="email" placeholder="Email address" required autocomplete="email" class="auth-input has-icon" />
                </div>

                <label for="password" class="sr-only">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" class="auth-input has-icon" />
                    <span class="toggle-password" onclick="togglePasswordVisibility('password', this)">👁️</span>
                </div>

                <div style="text-align: right; margin-top: -6px;">
                    <a href="forgot-password.html" class="auth-link" style="font-size: 13px;">Forgot password?</a>
                </div>

                <div id="login-error" class="error-msg" style="display: none; color: #ff3333; font-size: 14px; font-weight: 600; text-align: left; margin: -8px 0 8px 0;"></div>

                <button type="submit" class="auth-button" id="login-submit">Log In</button>
            </form>

            <p class="auth-switch">
                Don't have an account?
                <a href="register.html" class="auth-link">Create one free</a>
            </p>
        </section>
    </main>

    <script src="../js/main.js"></script>
    <script>
        // Helper function for password visibility
        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.innerText = '🙈';
            } else {
                input.type = 'password';
                iconElement.innerText = '👁️';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loginForm   = document.getElementById('login-form');
            const loginSubmit = document.getElementById('login-submit');
            const loginError  = document.getElementById('login-error');

            async function hashPassword(password) {
                const encoder    = new TextEncoder();
                const data       = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray  = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            function getDatabase() {
                const localData = localStorage.getItem('thola_database');
                return localData ? JSON.parse(localData) : [];
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginError.style.display = 'none';

                const email    = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;

                loginSubmit.disabled  = true;
                loginSubmit.innerText = 'Logging in...';

                try {
                    const users = getDatabase();
                    const user  = users.find(u => u.email.toLowerCase() === email);

                    if (!user) {
                        loginError.innerText     = 'Invalid email or password.';
                        loginError.style.display = 'block';
                        loginSubmit.disabled     = false;
                        loginSubmit.innerText    = 'Log In';
                        return;
                    }

                    const inputHash = await hashPassword(password);
                    if (inputHash === user.password) {
                        localStorage.setItem('thola_user', JSON.stringify({ name: user.name, email: user.email }));
                        window.location.href = 'dashboard.html';
                    } else {
                        loginError.innerText     = 'Invalid email or password.';
                        loginError.style.display = 'block';
                    }
                } catch (err) {
                    loginError.innerText     = 'Error performing authentication. Please try again.';
                    loginError.style.display = 'block';
                    console.error(err);
                } finally {
                    loginSubmit.disabled  = false;
                    loginSubmit.innerText = 'Log In';
                }
            });
        });
    </script>
</body>
</html>
